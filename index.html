              <div class="definition-box"><strong>📖 Отрезок</strong> — часть прямой, ограниченная двумя точками.<br><strong>Луч</strong> — часть прямой, состоящая из данной точки и всех точек, лежащих по одну сторону от неё.<br><strong>Угол</strong> — фигура, образованная двумя лучами с общим началом.<br><strong>Биссектриса угла</strong> — луч, делящий угол на два равных угла.<br><strong>Равенство фигур</strong> — совмещение наложением (движением).</div>

              <div class="theorem-box">📐 Формулы: S□=a², Sпр=ab, S△=½ah, Sпар=ah, Sтрап=½(a+b)h.</div>
              <div class="drawing-svg"><svg width="280" height="120" viewBox="0 0 280 120"><polygon points="40,90 100,30 190,30 250,90" fill="#cbe9f0" stroke="#0f6b7c"/><line x1="100" y1="30" x2="100" y2="90" stroke="#f4a261" stroke-dasharray="4"/><text x="105" y="65">h</text></svg><div class="fig-caption">Трапеция: S = ½(a+b)h</div></div>` }

              <div class="theorem-box">sin²α+cos²α=1, tgα·ctgα=1.</div>
              <div class="theorem-box">Значения: sin30°=½, cos30°=√3/2, sin45°=√2/2, sin60°=√3/2, sin120°=√3/2 и т.д.</div>

        tickets.forEach((ticket, idx) => {
            const card = document.createElement('div');
            card.className = 'ticket-card';
            card.id = `ticket-${idx+1}`;
            let partsHtml = '';
            ticket.parts.forEach(part => {
                partsHtml += `<div class="section-block"><div class="section-title">✦ ${part.q}</div><div>${part.a}</div></div>`;
            });
            card.innerHTML = `<div class="ticket-title">🎫 ${ticket.title}</div><div class="ticket-body">${partsHtml}</div>`;
            container.appendChild(card);
        });
    }
    
    function buildNav() {
        const navDiv = document.getElementById('nav-buttons');
        if(!navDiv) return;
        for(let i=1;i<=21;i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.onclick = () => {
                document.querySelectorAll('.ticket-nav button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`ticket-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            navDiv.appendChild(btn);
        }
        if(navDiv.firstChild) navDiv.firstChild.classList.add('active');
    }
    
    renderAll();
    buildNav();
</script>
</body>
</html>
